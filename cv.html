<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex" />
        <meta
            http-equiv="refresh"
            content="0; url={{ site.cv_url }}"
        />
        <link
            rel="canonical"
            href="{{ site.cv_url }}"
        />
        <title>CV | Antoine Chapel</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="page-shell">
            <div class="page-title">
                <p class="eyebrow">CV</p>
                <h1>Redirecting to CV</h1>
                <p>
                    If the redirect does not start automatically,
                    <a
                        href="{{ site.cv_url }}"
                        >open the CV here</a
                    >.
                </p>
            </div>
        </main>
    </body>
</html>
